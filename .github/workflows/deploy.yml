name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Verify model artifacts present
        run: |
          test -f public/model/model.onnx        || (echo "::error::Missing public/model/model.onnx — run model/scripts/export_onnx.py and copy artifacts" && exit 1)
          test -f public/model/scaler.json       || (echo "::error::Missing public/model/scaler.json" && exit 1)
          test -f public/model/srtm_neighbors.json || (echo "::error::Missing public/model/srtm_neighbors.json" && exit 1)
          test -f public/model/margin.json       || (echo "::error::Missing public/model/margin.json" && exit 1)

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
